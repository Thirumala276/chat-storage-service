spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chat_storage_dev}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    jpa:
      show-sql: false
      hibernate:
        ddl-auto: validate
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect
    liquibase:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  connection-timeout: 100000
  servlet:
    context-path: /chat

security:
  api-key: ${API_KEY:dev-secure-key}

openapi:
  project-title: RAG Chat Storage API
  project-version: 1.0.0
  project-description: RAG Chat Storage API

gemini:
  model: gemini-2.0-flash
  api-key: ${GEMINI_API_KEY:AIzaSyC-kwpYTB7QN0NkEpn86g1zvsFPG2EvWlU}

cors:
  allowed-origins:
    - "https://example.com"
    - "http://localhost:*"

rate-limit:
  capacity: 100          # max requests
  duration-in-minutes: 1 # refill duration

logging:
  level:
    org.springframework: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true
